name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Change 'scribble-ai-service' to your ACTUAL Space name if different
          git push --force https://karthikjurmure:$HF_TOKEN@huggingface.co/spaces/karthikjurmure/scribble-ai-service main
